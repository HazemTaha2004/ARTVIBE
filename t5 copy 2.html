<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtVibe Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
    
  </head>
  <body class="bg-gray-900 text-white min-h-screen font-serif">
    <header
      class="fixed top-0 left-0 w-full bg-gray-900/80 backdrop-blur-sm z-20 p-4 flex justify-between items-center"
    >
      <div class="header-title">ArtVibe</div>
      <div class="flex items-center space-x-4">
        <button
          id="theme-toggle"
          class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 transition"
        >
          <span class="sun">☀️</span>
          <span class="moon hidden">🌙</span>
        </button>
        <div class="w-10 h-10 rounded-full bg-gray-700"></div>
        <!-- Profile icon placeholder -->
      </div>
    </header>

    <main class="pt-20 pb-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="controls flex justify-center mb-8 space-x-4">
        <button
          id="all-posts"
          class="px-4 py-2 border border-white rounded uppercase tracking-wide hover:bg-red-600 transition active"
        >
          All Posts
        </button>
        <button
          id="favorites"
          class="px-4 py-2 border border-white rounded uppercase tracking-wide hover:bg-red-600 transition"
        >
          Favorites
        </button>
      </div>

      <section
        id="spotlight"
        class="mb-12 rounded-lg overflow-hidden shadow-lg"
      ></section>

      <div
        id="content"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-12 gap-6"
      ></div>
      <div
        id="loading"
        class="text-center py-8 text-lg opacity-0 transition-opacity"
      >
        Loading...
      </div>
    </main>

    <div
      id="lightbox"
      class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-30 p-4"
    >
      <img
        id="lightbox-img"
        class="max-w-full max-h-[90vh] rounded-lg shadow-xl"
        src=""
        alt=""
      />
      <button
        id="close-lightbox"
        class="absolute top-4 right-4 text-3xl text-white"
      >
        &times;
      </button>
      <button
        id="prev-slide"
        class="absolute left-4 text-3xl text-white hidden sm:block"
      >
        &larr;
      </button>
      <button
        id="next-slide"
        class="absolute right-4 text-3xl text-white hidden sm:block"
      >
        &rarr;
      </button>
    </div>

    <script src="./js/plugin.js"></script>
  </body>
</html>
